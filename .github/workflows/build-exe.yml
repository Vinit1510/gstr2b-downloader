name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60

    defaults:
      run:
        shell: cmd

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: "x64"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Upgrade pip and install build tools
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install pyinstaller==6.11.0

      - name: Install application dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install chromium

      - name: Pre-download EasyOCR English model
        run: python -c "import easyocr; easyocr.Reader(['en'], gpu=False, verbose=False)"

      - name: Build .exe
        run: pyinstaller build.spec --clean --noconfirm

      - name: Show output
        run: dir dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GSTR2B_Downloader-windows-x64
          path: dist/GSTR2B_Downloader.exe
          if-no-files-found: error
          retention-days: 30

      - name: Create / update Latest release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest build (auto)"
          body: |
            Automatic Windows build of GSTR-2B Downloader.
            Commit: ${{ github.sha }}
            Built on: ${{ github.run_started_at }}
          files: dist/GSTR2B_Downloader.exe
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
